<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Language Translator — CodeAlpha</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
      --accent: #6c63ff; --accent2: #a78bfa; --text: #e8e9f0;
      --muted: #7b7e9a; --success: #22d3a3; --radius: 14px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 48px; }
    header { text-align: center; margin-bottom: 28px; }
    .badge { display: inline-block; background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 4px 12px; border-radius: 20px; margin-bottom: 14px; }
    h1 { font-size: clamp(22px, 5vw, 32px); font-weight: 700;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    p.subtitle { color: var(--muted); font-size: 14px; margin-top: 8px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; width: 100%; max-width: 520px; }
    .lang-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    select { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 10px 12px; border-radius: 10px; font-size: 14px; font-family: inherit;
      appearance: none; cursor: pointer; outline: none; }
    .swap-btn { background: var(--border); border: none; color: var(--text); width: 38px; height: 38px;
      border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; }
    label { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 0.8px;
      text-transform: uppercase; display: block; margin-bottom: 8px; }
    textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 10px; padding: 12px 14px; font-size: 15px; font-family: inherit;
      resize: none; outline: none; line-height: 1.6; }
    .char-count { text-align: right; font-size: 11px; color: var(--muted); margin-top: 4px; margin-bottom: 16px; }
    .translate-btn { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; color: #fff; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600;
      font-family: inherit; cursor: pointer; margin-bottom: 8px; }
    .translate-btn:disabled { opacity: 0.5; }
    .open-btn { width: 100%; background: transparent; border: 1px solid var(--accent); color: var(--accent2);
      padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; }
    .status { font-size: 12px; color: var(--muted); text-align: center; margin: 8px 0; min-height: 18px; }
    .result-box { margin-top: 16px; display: none; }
    .result-box.visible { display: block; }
    .result-text { background: var(--bg); border: 1px solid var(--accent); border-radius: 10px;
      padding: 14px; font-size: 15px; line-height: 1.7; min-height: 60px; color: var(--text); word-break: break-word; }
    .extra-box { background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; font-size: 13px; line-height: 1.6; color: var(--muted); margin-top: 10px; display: none; }
    .extra-box.visible { display: block; }
    .extra-box b { color: var(--text); }
    .action-row { display: flex; gap: 8px; margin-top: 10px; }
    .icon-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--border); border: none; color: var(--text); padding: 10px; border-radius: 8px;
      font-size: 13px; font-family: inherit; cursor: pointer; }
    .error { color: #f87171; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
      border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 12px; display: none; }
    .error.visible { display: block; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
      background: var(--success); color: #0f1117; font-weight: 600; font-size: 13px;
      padding: 10px 20px; border-radius: 20px; transition: transform 0.3s ease; pointer-events: none; z-index: 100; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .divider { display: flex; align-items: center; gap: 10px; margin: 14px 0; color: var(--muted); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer { margin-top: 28px; color: var(--muted); font-size: 12px; text-align: center; }
    footer span { color: var(--accent2); }
  </style>
</head>
<body>
<header>
  <div class="badge">CodeAlpha · Task 1</div>
  <h1>Language Translator</h1>
  <p class="subtitle">Mrutunjaya welcomes you to this translation tool </p>
</header>

<div class="card">
  <div class="lang-row">
    <select id="sourceLang">
      <option value="en">English</option>
      <option value="hi">Hindi</option>
      <option value="or">Odia</option>
      <option value="ur">Urdu</option>
      <option value="ar">Arabic</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="es">Spanish</option>
      <option value="zh-CN">Chinese</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
      <option value="pt">Portuguese</option>
      <option value="ru">Russian</option>
      <option value="it">Italian</option>
      <option value="tr">Turkish</option>
      <option value="bn">Bengali</option>
      <option value="ta">Tamil</option>
      <option value="te">Telugu</option>
      <option value="ml">Malayalam</option>
    </select>
    <button class="swap-btn" onclick="swapLanguages()">⇄</button>
    <select id="targetLang">
      <option value="hi">Hindi</option>
      <option value="en">English</option>
      <option value="or">Odia</option>
      <option value="ur">Urdu</option>
      <option value="ar">Arabic</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="es">Spanish</option>
      <option value="zh-CN">Chinese</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
      <option value="pt">Portuguese</option>
      <option value="ru">Russian</option>
      <option value="it">Italian</option>
      <option value="tr">Turkish</option>
      <option value="bn">Bengali</option>
      <option value="ta">Tamil</option>
      <option value="te">Telugu</option>
      <option value="ml">Malayalam</option>
    </select>
  </div>

  <label for="inputText">Enter Text</label>
  <textarea id="inputText" rows="4" placeholder="Type a word, phrase, idiom, or sentence…" maxlength="500" oninput="updateCount()"></textarea>
  <div class="char-count"><span id="charCount">0</span> / 500</div>

  <button class="translate-btn" id="translateBtn" onclick="doTranslate()">⚡ Translate</button>
  <div class="status" id="status"></div>
  <div class="error" id="errorBox"></div>

  <div class="result-box" id="resultBox">
    <label style="margin:0 0 6px">Translation</label>
    <div class="result-text" id="resultText"></div>

    <div class="extra-box" id="extraBox"></div>

    <div class="action-row">
      <button class="icon-btn" onclick="copyText()">📋 Copy</button>
      <button class="icon-btn" onclick="speakText()">🔊 Listen</button>
      <button class="icon-btn" onclick="clearAll()">🗑 Clear</button>
    </div>
  </div>

  <div class="divider">OR open directly</div>
  <button class="open-btn" onclick="openGoogle()">🌐 Open in Google Translate</button>
</div>

<footer>Built by intern at <span>CodeAlpha</span> · AI Internship Task 1</footer>
<div class="toast" id="toast">Copied! ✓</div>

<script>
function updateCount() {
  document.getElementById('charCount').textContent = document.getElementById('inputText').value.length;
}

function swapLanguages() {
  const src = document.getElementById('sourceLang');
  const tgt = document.getElementById('targetLang');
  const tmp = src.value; src.value = tgt.value; tgt.value = tmp;
}

async function doTranslate() {
  const text = document.getElementById('inputText').value.trim();
  const src  = document.getElementById('sourceLang').value;
  const tgt  = document.getElementById('targetLang').value;

  if (!text) { showError('Please enter some text.'); return; }
  if (src === tgt) { showError('Please choose different languages.'); return; }

  clearError();
  document.getElementById('resultBox').classList.remove('visible');
  document.getElementById('extraBox').classList.remove('visible');
  document.getElementById('translateBtn').disabled = true;
  document.getElementById('status').innerHTML = '<span class="spinner"></span> Translating…';

  // dt=t  -> main translation
  // dt=bd -> dictionary / alternate meanings (for single words)
  // dt=rm -> transliteration / romanization (pronunciation guide)
  const ggUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${src}&tl=${tgt}&dt=t&dt=bd&dt=rm&q=${encodeURIComponent(text)}`;

  const attempts = [
    () => fetch(ggUrl).then(r => r.json()).then(d => {
      if (!d || !d[0] || !d[0].length) throw new Error('bad');

      // Main translated sentence (joins all chunks)
      const translated = d[0].map(x => x[0]).filter(Boolean).join('');
      if (!translated || translated.trim().toLowerCase() === text.trim().toLowerCase()) {
        throw new Error('bad');
      }

      // Transliteration / pronunciation (how it sounds)
      let translit = '';
      d[0].forEach(chunk => { if (chunk[2]) translit += chunk[2]; });

      // Dictionary alternate meanings (only present for single words)
      let altMeanings = [];
      if (d[1] && Array.isArray(d[1])) {
        d[1].forEach(pos => {
          if (pos[1] && pos[1].length) {
            altMeanings.push({ partOfSpeech: pos[0], words: pos[1].slice(0, 5) });
          }
        });
      }

      return { translated, translit, altMeanings };
    }),

    // Backup: MyMemory (basic translation only)
    () => fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|${tgt}`)
            .then(r => r.json()).then(d => {
              if (d.responseStatus === 200 && d.responseData.translatedText) {
                return { translated: d.responseData.translatedText, translit: '', altMeanings: [] };
              }
              throw new Error('bad');
            }),
  ];

  for (let i = 0; i < attempts.length; i++) {
    try {
      const result = await Promise.race([
        attempts[i](),
        new Promise((_, r) => setTimeout(() => r(new Error('timeout')), 9000))
      ]);

      if (result && result.translated) {
        document.getElementById('resultText').textContent = result.translated;
        document.getElementById('resultBox').classList.add('visible');

        // Build extra info box (pronunciation + meanings)
        let extraHTML = '';
        if (result.translit) {
          extraHTML += `<b>Pronunciation:</b> ${result.translit}<br>`;
        }
        if (result.altMeanings && result.altMeanings.length) {
          extraHTML += `<b>Other meanings:</b><br>`;
          result.altMeanings.forEach(pos => {
            extraHTML += `&nbsp;&nbsp;<i>${pos.partOfSpeech}</i>: ${pos.words.join(', ')}<br>`;
          });
        }
        const extraBox = document.getElementById('extraBox');
        if (extraHTML) {
          extraBox.innerHTML = extraHTML;
          extraBox.classList.add('visible');
        } else {
          extraBox.classList.remove('visible');
        }

        document.getElementById('status').textContent = '✓ Translation complete';
        document.getElementById('translateBtn').disabled = false;
        return;
      }
    } catch (e) {
      console.log('attempt', i, 'failed:', e.message);
    }
  }

  document.getElementById('translateBtn').disabled = false;
  document.getElementById('status').textContent = '';
  showError('Translation failed on this network. Tap "Open in Google Translate" below — it will open with your text already entered!');
}

function showError(msg) {
  const b = document.getElementById('errorBox');
  b.textContent = msg; b.classList.add('visible');
  document.getElementById('translateBtn').disabled = false;
  document.getElementById('status').textContent = '';
}

function clearError() {
  document.getElementById('errorBox').classList.remove('visible');
}

function openGoogle() {
  const text = document.getElementById('inputText').value.trim();
  const src  = document.getElementById('sourceLang').value;
  const tgt  = document.getElementById('targetLang').value;
  if (!text) { showError('Enter text first, then tap this button.'); return; }
  window.open(`https://translate.google.com/?sl=${src}&tl=${tgt}&text=${encodeURIComponent(text)}&op=translate`, '_blank');
}

function copyText() {
  const t = document.getElementById('resultText').textContent;
  if (!t) return;
  navigator.clipboard.writeText(t).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}

function speakText() {
  const t = document.getElementById('resultText').textContent;
  const tgt = document.getElementById('targetLang').value;
  if (!t) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(t);
  u.lang = tgt;
  speechSynthesis.speak(u);
}

function clearAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('resultText').textContent = '';
  document.getElementById('extraBox').textContent = '';
  document.getElementById('extraBox').classList.remove('visible');
  document.getElementById('resultBox').classList.remove('visible');
  document.getElementById('charCount').textContent = '0';
  document.getElementById('status').textContent = '';
  clearError();
}
</script>
</body>
</html>
