      <option value="ar">🇸🇦 Arabic</option>

      <option value="ko">🇰🇷 Korean</option>
      <option value="pt">🇧🇷 Portuguese</option>

      <option value="it">🇮🇹 Italian</option>

<script>
  function updateCount() {
    document.getElementById('charCount').textContent = document.getElementById('inputText').value.length;
  }

  function swapLanguages() {
    const src = document.getElementById('sourceLang');
    const tgt = document.getElementById('targetLang');
    [src.value, tgt.value] = [tgt.value, src.value];
  }

  // ---------- API 1: MyMemory ----------
  async function tryMyMemory(text, src, tgt) {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|${tgt}&de=test@test.com`;
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    if (data.responseStatus === 200 && data.responseData.translatedText) {
      return data.responseData.translatedText;
    }
    throw new Error('MyMemory failed');
  }

  // ---------- API 2: LibreTranslate (public instance) ----------
  async function tryLibreTranslate(text, src, tgt) {
    const res = await fetch('https://libretranslate.com/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ q: text, source: src, target: tgt, format: 'text' }),
      signal: AbortSignal.timeout(8000)
    });
    const data = await res.json();
    if (data.translatedText) return data.translatedText;
    throw new Error('LibreTranslate failed');
  }

  // ---------- API 3: Lingva Translate (open source Google Translate proxy) ----------
  async function tryLingva(text, src, tgt) {
    const url = `https://lingva.ml/api/v1/${src}/${tgt}/${encodeURIComponent(text)}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    if (data.translation) return data.translation;
    throw new Error('Lingva failed');
  }

  async function translate() {
    const text = document.getElementById('inputText').value.trim();
    const src  = document.getElementById('sourceLang').value;
    const tgt  = document.getElementById('targetLang').value;
    const btn  = document.getElementById('translateBtn');
    const loader = document.getElementById('loader');
    const errorBox = document.getElementById('errorBox');
    const resultBox = document.getElementById('resultBox');
    const apiStatus = document.getElementById('apiStatus');

    if (!text) { showError('Please enter some text first.'); return; }
    if (src === tgt) { showError('Please select different source and target languages.'); return; }

    errorBox.classList.remove('visible');
    resultBox.classList.remove('visible');
    btn.disabled = true;
    loader.classList.add('active');
    apiStatus.textContent = '';

    const apis = [
      { name: 'MyMemory', fn: () => tryMyMemory(text, src, tgt) },
      { name: 'Lingva',   fn: () => tryLingva(text, src, tgt) },
      { name: 'LibreTranslate', fn: () => tryLibreTranslate(text, src, tgt) },
    ];

    let result = null;
    for (const api of apis) {
      try {
        apiStatus.textContent = `Trying ${api.name}…`;
        result = await api.fn();
        apiStatus.textContent = `✓ Translated via ${api.name}`;
        break;
      } catch (e) {
        console.warn(`${api.name} failed:`, e.message);
      }
    }

    loader.classList.remove('active');
    btn.disabled = false;

    if (result) {
      document.getElementById('resultText').textContent = result;
      resultBox.classList.add('visible');
    } else {
      apiStatus.textContent = '';
      showError('All translation services are unavailable right now. Please check your internet connection and try again.');
    }
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg;
    box.classList.add('visible');
  }

  function copyText() {
    const text = document.getElementById('resultText').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
  }

  function speakText() {
    const text = document.getElementById('resultText').textContent;
    const tgt  = document.getElementById('targetLang').value;
    if (!text) return;
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = tgt;
    speechSynthesis.speak(utter);
  }

  function clearAll() {
    document.getElementById('inputText').value = '';
    document.getElementById('resultText').textContent = '';
    document.getElementById('resultBox').classList.remove('visible');
    document.getElementById('errorBox').classList.remove('visible');
    document.getElementById('charCount').textContent = '0';
    document.getElementById('apiStatus').textContent = '';
  }

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') translate();
  });
</script>
</body>
</html>
