<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Language Translator</title>

<style>
:root{
    --bg:#f4f4f4;
    --card:#ffffff;
    --text:#222;
    --btn:#007bff;
}

.dark{
    --bg:#121212;
    --card:#1e1e1e;
    --text:#ffffff;
    --btn:#0d6efd;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
}

.container{
    max-width:800px;
    margin:30px auto;
    padding:20px;
    background:var(--card);
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
}

textarea{
    width:100%;
    height:130px;
    padding:10px;
    border-radius:10px;
    resize:none;
    margin-bottom:10px;
}

.row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

select,button{
    padding:10px;
    border:none;
    border-radius:8px;
}

button{
    background:var(--btn);
    color:white;
    cursor:pointer;
}

.output{
    min-height:120px;
    border:1px solid #ccc;
    border-radius:10px;
    padding:10px;
    margin-top:15px;
}

.top-buttons{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.status{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="top-buttons">
<button onclick="toggleTheme()">🌙 Dark Mode</button>
<button onclick="startSpeech()">🎤 Voice Input</button>
</div>

<h1>🌍 AI Language Translator</h1>

<textarea id="inputText" placeholder="Enter text here..."></textarea>

<div class="row">
<select id="sourceLang">
<option value="auto">Detect Language</option>
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="ta">Tamil</option>
<option value="te">Telugu</option>
<option value="or">Odia</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="ja">Japanese</option>
<option value="ko">Korean</option>
</select>

<select id="targetLang">
<option value="hi">Hindi</option>
<option value="en">English</option>
<option value="ta">Tamil</option>
<option value="te">Telugu</option>
<option value="or">Odia</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="ja">Japanese</option>
<option value="ko">Korean</option>
</select>
</div>

<br>

<div class="row">
<button onclick="translateText()">Translate</button>
<button onclick="swapLanguages()">🔄 Swap</button>
<button onclick="copyText()">📋 Copy</button>
<button onclick="speakTranslation()">🔊 Speak</button>
</div>

<div class="status" id="status"></div>

<div class="output" id="translatedText">
Translation will appear here...
</div>

</div>

<script>

function toggleTheme(){
    document.body.classList.toggle("dark");
}

function swapLanguages(){
    let source=document.getElementById("sourceLang");
    let target=document.getElementById("targetLang");

    let temp=source.value;
    source.value=target.value;
    target.value=temp;
}

async function translateText(){

    let text=document.getElementById("inputText").value.trim();

    if(!text){
        alert("Please enter text.");
        return;
    }

    let source=document.getElementById("sourceLang").value;
    let target=document.getElementById("targetLang").value;

    document.getElementById("status").innerText="Translating...";

    try{

        let response=await fetch(
        "https://translate.argosopentech.com/translate",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                q:text,
                source:source,
                target:target,
                format:"text"
            })
        });

        let data=await response.json();

        document.getElementById("translatedText").innerText=
        data.translatedText;

        document.getElementById("status").innerText=
        "Translation Completed ✔";

    }catch(error){

        document.getElementById("status").innerText=
        "Translation Service Unavailable";
    }
}

function copyText(){

    let text=
    document.getElementById("translatedText").innerText;

    navigator.clipboard.writeText(text);

    alert("Copied Successfully");
}

function speakTranslation(){

    let text=
    document.getElementById("translatedText").innerText;

    let speech=
    new SpeechSynthesisUtterance(text);

    speechSynthesis.speak(speech);
}

function startSpeech(){

    if(!('webkitSpeechRecognition' in window)){

        alert("Speech Recognition Not Supported");
        return;
    }

    let recognition=
    new webkitSpeechRecognition();

    recognition.lang='en-US';

    recognition.start();

    recognition.onresult=function(event){

        document.getElementById("inputText").value=
        event.results[0][0].transcript;
    };
}

</script>

</body>
</html>
